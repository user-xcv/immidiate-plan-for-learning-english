<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>B2 Hardcore Ultimate Matrix Engine v6.0 - Absolute Counter</title>
    <style>
        :root {
            --bg: #030712; --card: #0b1329; --primary: #2563eb; 
            --success: #10b981; --warning: #f59e0b; --danger: #ef4444; --text: #f8fafc;
            --accent: #38bdf8; --border: #1e293b; --purple: #a855f7;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); padding: 8px; -webkit-tap-highlight-color: transparent; }
        .container { max-width: 1700px; margin: 0 auto; }
        
        /* ULTRA ABSOLUTE DEADLINE DISPLAY (MOBILE & PC) */
        .deadline-container {
            background: linear-gradient(180deg, #1e0b0b, #000000);
            border: 3px solid var(--danger);
            border-radius: 16px;
            padding: 20px 10px;
            margin-bottom: 15px;
            text-align: center;
            box-shadow: 0 0 35px rgba(239, 68, 68, 0.4);
            position: relative;
        }
        .deadline-title {
            font-size: 13px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #ff9999;
            margin-bottom: 15px;
            text-shadow: 0 0 8px rgba(239, 68, 68, 0.6);
        }
        .countdown-grid {
            display: flex;
            justify-content: center;
            gap: 6px;
            margin-bottom: 15px;
        }
        .countdown-box {
            background: rgba(15, 23, 42, 0.9);
            padding: 12px 2px;
            border-radius: 10px;
            flex: 1;
            max-width: 85px;
            border: 2px solid #331010;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .countdown-box span {
            display: block;
            font-size: 28px;
            font-weight: 950;
            color: #ffffff;
            line-height: 1;
            font-family: monospace, sans-serif;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.5);
        }
        .countdown-box.seconds-box span {
            color: var(--warning);
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.5);
        }
        .countdown-box label {
            font-size: 9px;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 800;
            margin-top: 6px;
            display: block;
            letter-spacing: 0.5px;
        }
        .deadline-bar-bg {
            height: 6px;
            background: #111827;
            border-radius: 4px;
            margin: 0 auto;
            max-width: 500px;
            border: 1px solid #1e293b;
            overflow: hidden;
        }
        .deadline-bar-fill {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, var(--warning), var(--danger));
            box-shadow: 0 0 8px var(--danger);
        }

        /* HEADER & STATS RESPONSIVE */
        header { 
            background: linear-gradient(135deg, #1e1b4b, #1e3a8a); 
            padding: 15px; 
            border-radius: 12px; 
            margin-bottom: 15px; 
            display: flex; 
            flex-direction: column;
            gap: 12px; 
            border: 1px solid var(--border); 
        }
        .header-title-block { text-align: center; }
        .stats-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 6px; 
            width: 100%; 
        }
        .box { background: rgba(0,0,0,0.5); padding: 8px 4px; border-radius: 8px; text-align: center; border: 1px solid rgba(255,255,255,0.05); position: relative; overflow: hidden; }
        .box span { display: block; font-size: 16px; font-weight: bold; color: var(--accent); }
        .box label { font-size: 9px; text-transform: uppercase; color: #94a3b8; font-weight: 600; }
        .box::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 100%; background: var(--primary); }
        .box.purple::before { background: var(--purple); }
        .box.success::before { background: var(--success); }
        
        .header-btns { display: flex; gap: 8px; width: 100%; }
        .header-btns .btn { flex: 1; text-align: center; justify-content: center; }

        /* LAYOUT CONFIGURATION */
        .main-layout { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .card { background: var(--card); padding: 15px; border-radius: 12px; border: 1px solid var(--border); margin-bottom: 15px; }
        .card-title { font-size: 14px; font-weight: bold; padding-bottom: 10px; border-bottom: 1px solid var(--border); margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        
        .tabs { 
            display: flex; 
            gap: 6px; 
            overflow-x: auto; 
            padding-bottom: 8px; 
            margin-bottom: 12px; 
            scrollbar-width: none;
            -webkit-overflow-scrolling: touch;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab { background: #1e293b; border: 1px solid #334155; padding: 8px 14px; border-radius: 6px; cursor: pointer; font-size: 11px; font-weight: bold; color: #94a3b8; white-space: nowrap; }
        .tab.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        .day-row { border: 1px solid var(--border); border-radius: 8px; margin-bottom: 10px; background: #070f21; }
        .day-row.is-today { border: 1.5px solid var(--accent); }
        .day-header { background: #0f1c3f; padding: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-size: 12px; }
        .day-content { padding: 12px; background: #040a17; display: none; border-top: 1px solid var(--border); }
        .day-content.open { display: block; }
        
        .inputs-row { display: grid; grid-template-columns: 1fr; gap: 8px; margin-bottom: 12px; }
        .topic-input-wrapper { background: #0f172a; padding: 8px; border-radius: 6px; border: 1px dashed #334155; }
        .topic-input-wrapper label { font-size: 10px; font-weight: bold; color: var(--accent); display: block; margin-bottom: 4px; }
        .topic-input-wrapper input { width: 100%; background: #070a12; border: 1px solid #334155; border-radius: 4px; padding: 8px; color: white; font-size: 12px; outline: none; }

        .task-line { display: flex; align-items: flex-start; gap: 8px; padding: 8px 0; border-bottom: 1px dashed #1e293b; font-size: 12px; line-height: 1.4; }
        .task-line input[type="checkbox"] { width: 16px; height: 16px; margin-top: 2px; flex-shrink: 0; accent-color: var(--success); }

        .fld { display: flex; flex-direction: column; gap: 4px; background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid var(--border); margin-top: 10px; }
        .fld label { font-size: 11px; font-weight: bold; color: #cbd5e1; }
        .fld textarea { width: 100%; min-height: 80px; background: #050b14; border: 1px solid #334155; border-radius: 6px; color: white; padding: 8px; font-size: 12px; resize: vertical; outline: none; }
        .fld span.counter { font-size: 10px; text-align: right; color: var(--accent); font-weight: bold; }
        
        .live-bar { height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; }
        .live-bar-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--success)); }

        .btn { background: var(--primary); border: none; color: white; padding: 8px 12px; font-size: 11px; font-weight: bold; border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; }
        .btn-secondary { background: #1e293b; border: 1px solid #334155; color: #cbd5e1; }
        
        .analytics-tabs { display: flex; background: #070a12; border-radius: 8px; padding: 3px; margin-bottom: 12px; border: 1px solid var(--border); gap: 2px; }
        .an-tab { flex: 1; padding: 10px 4px; background: transparent; border: none; color: #94a3b8; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; border-radius: 6px; }
        .an-tab.active { background: #1e293b; color: var(--accent); }
        
        .report-section { background: #070f21; border: 1px solid var(--border); border-radius: 8px; padding: 12px; margin-bottom: 12px; }
        .report-section h4 { font-size: 12px; color: var(--warning); margin-bottom: 8px; text-transform: uppercase; border-bottom: 1px dashed #334155; padding-bottom: 4px; }
        .analysis-list { font-size: 11px; color: #cbd5e1; padding-left: 15px; line-height: 1.6; max-height: 200px; overflow-y: auto; }
        
        .match-badge { display: inline-block; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .match-high { background: rgba(16, 185, 129, 0.15); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.3); }
        .match-low { background: rgba(245, 158, 11, 0.15); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.3); }

        .progress-container { margin: 8px 0; background: #1e293b; border-radius: 6px; height: 16px; position: relative; overflow: hidden; border: 1px solid #334155; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #2563eb, #a855f7); width: 0%; transition: width 0.3s ease; }
        .progress-text { position: absolute; width: 100%; text-align: center; font-size: 10px; font-weight: bold; top: 0px; color: white; z-index: 2; line-height: 14px; }
        
        .today-tag { background: #0284c7; color: white; padding: 1px 4px; border-radius: 3px; font-size: 9px; font-weight: bold; margin-left: 4px; }
        .badge-type { font-size: 9px; padding: 1px 4px; border-radius: 3px; font-weight: bold; background: #334155; color: #cbd5e1; margin-left: 4px; }
        .badge-type.in { background: rgba(37, 99, 235, 0.2); color: #60a5fa; border: 1px solid rgba(37,99,235,0.4); }
        .badge-type.out { background: rgba(168, 85, 247, 0.2); color: #c084fc; border: 1px solid rgba(168,85,247,0.4); }
        .nested-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
        .empty-state { color: #64748b; font-style: italic; font-size: 11px; text-align: center; padding: 10px 0; }

        @media (min-width: 768px) {
            body { padding: 15px; }
            .deadline-container { padding: 30px; }
            .deadline-title { font-size: 16px; letter-spacing: 2px; }
            .countdown-box span { font-size: 46px; }
            .countdown-box label { font-size: 11px; }
            header { flex-direction: row; justify-content: space-between; align-items: center; }
            .header-title-block { text-align: left; }
            .stats-grid { grid-template-columns: repeat(5, 1fr); width: auto; }
            .box span { font-size: 24px; }
            .box label { font-size: 11px; }
            .header-btns { width: auto; }
            .inputs-row { grid-template-columns: 1fr 1fr; }
            .nested-grid { grid-template-columns: 1fr 1fr; }
        }
        @media (min-width: 1200px) {
            .main-layout { grid-template-columns: 1.2fr 1.8fr; }
        }
    </style>
</head>
<body>

    <div class="container">
        
        <div class="deadline-container">
            <div class="deadline-title">🏁 1-SENTYABR MAVSUMIGACHA QOLGAN ANIQ VAQT MATRIXI</div>
            <div class="countdown-grid">
                <div class="countdown-box"><span id="dl-days">00</span><label>KUN</label></div>
                <div class="countdown-box"><span id="dl-hours">00</span><label>SOAT</label></div>
                <div class="countdown-box"><span id="dl-mins">00</span><label>MINUT</label></div>
                <div class="countdown-box seconds-box"><span id="dl-secs">00</span><label>SONIYA</label></div>
            </div>
            <div class="deadline-bar-bg">
                <div class="deadline-bar-fill" id="dl-bar"></div>
            </div>
        </div>

        <header>
            <div class="header-title-block">
                <h2 style="font-size: 18px; letter-spacing: 0.5px; color: #fff;">B2 HARDCORE MATRIX v6.0 ⚡</h2>
                <p id="live-clock" style="font-size: 11px; color: var(--accent); margin-top: 3px; font-weight: 500;">Yuklanmoqda...</p>
            </div>
            <div class="stats-grid">
                <div class="box"><span id="st-streak">0 kun</span><label>Streak 🔥</label></div>
                <div class="box success"><span id="st-vocab">0</span><label>So'z 📚</label></div>
                <div class="box"><span id="st-pattern">0</span><label>Pattern 🔄</label></div>
                <div class="box purple"><span id="st-grammar">0</span><label>Murphy 📘</label></div>
                <div class="box success"><span id="st-speech">0</span><label>Spontan 🗣️</label></div>
            </div>
            <div class="header-btns">
                <button class="btn btn-secondary" onclick="exportBackup()">💾 Export</button>
                <button class="btn btn-secondary" onclick="document.getElementById('imp').click()">📂 Import</button>
                <input type="file" id="imp" style="display:none;" onchange="importBackup(this)">
            </div>
        </header>

        <div class="main-layout">
            <div class="workspace">
                <div class="card">
                    <div class="card-title">
                        <div>Mavjud Konveyer</div>
                        <span id="lbl-wk" style="color:var(--accent); font-weight: bold; font-size: 12px;">1-Hafta</span>
                    </div>
                    <div class="tabs" id="tab-box"></div>
                    <div id="day-box"></div>
                </div>
            </div>

            <div class="analytics">
                <div class="card" style="position: sticky; top: 10px;">
                    <div class="card-title" style="color:var(--accent); border-color: #334155;">📋 STRATEGIK MONITORING PANEL</div>
                    
                    <div class="analytics-tabs">
                        <button class="an-tab active" onclick="switchReportTab('day')">Kunlik Tahlil</button>
                        <button class="an-tab" onclick="switchReportTab('week')">Haftalik Ro'yxat</button>
                        <button class="an-tab" onclick="switchReportTab('month')">Oylik Strategiya</button>
                    </div>

                    <div id="report-content-panel"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const TOTAL_WEEKS = 12;
        const DAYS = [
            { id: 'Shanba', type: 'input', label: '1-KUN: INPUT & AMALIYOT (Shanba)' },
            { id: 'Yakshanba', type: 'output', label: '2-KUN: OUTPUT & PORTLASH (Yakshanba)', pair: 'Shanba' },
            { id: 'Dushanba', type: 'input', label: '1-KUN: INPUT & AMALIYOT (Dushanba)' },
            { id: 'Seshanba', type: 'output', label: '2-KUN: OUTPUT & PORTLASH (Seshanba)', pair: 'Dushanba' },
            { id: 'Chorshanba', type: 'input', label: '1-KUN: INPUT & AMALIYOT (Chorshanba)' },
            { id: 'Payshanba', type: 'output', label: '2-KUN: OUTPUT & PORTLASH (Payshanba)', pair: 'Chorshanba' },
            { id: 'Juma', type: 'rest', label: '💤 TIKLANISH KUNI (Juma)' }
        ];
        
        const START_DATE = new Date('2026-05-18'); 
        const TARGET_DEADLINE = new Date('2026-09-01T00:00:00'); 
        
        let state = JSON.parse(localStorage.getItem('b2HardcoreV5UltimateState')) || {};
        let activeWeek = 1;
        let currentReportTab = 'day'; 
        let currentSelectedDay = 'Shanba';

        if (Object.keys(state).length === 0) resetState();

        function resetState() {
            state = {};
            for(let w=1; w<=TOTAL_WEEKS; w++) {
                state[w] = {};
                DAYS.forEach(d => {
                    let isRest = (d.type === 'rest');
                    state[w][d.id] = {
                        completed: isRest, isRest: isRest, type: d.type, pair: d.pair || null,
                        topicName: "", murphyUnit: "",
                        tasks: isRest ? [] : [false,false,false,false,false,false],
                        vocab: "", grammar: "", pattern: "", speaking: "", academicWriting: ""
                    };
                });
            }
            save();
        }

        function save() { localStorage.setItem('b2HardcoreV5UltimateState', JSON.stringify(state)); }

        function countUniqueLines(t) { 
            if(!t) return 0;
            return t.split('\n').map(l=>l.trim()).filter(l=>l.length > 0).length; 
        }

        function getCleanLinesArray(t) {
            if(!t) return [];
            return t.split('\n').map(l=>l.trim()).filter(l=>l.length > 0);
        }

        function getDayDateString(week, dayId) {
            let idx = DAYS.findIndex(d => d.id === dayId);
            let totalDaysOffset = ((week - 1) * 7) + idx - 2;
            let targetDate = new Date(START_DATE);
            targetDate.setDate(START_DATE.getDate() + totalDaysOffset);
            return targetDate.toLocaleDateString('uz-UZ', { day: 'numeric', month: 'short' });
        }

        function isToday(week, dayId) {
            let idx = DAYS.findIndex(d => d.id === dayId);
            let totalDaysOffset = ((week - 1) * 7) + idx - 2;
            let d = new Date(START_DATE);
            d.setDate(START_DATE.getDate() + totalDaysOffset);
            let today = new Date();
            return d.getDate() === today.getDate() && d.getMonth() === today.getMonth() && d.getFullYear() === today.getFullYear();
        }

        function calculateTrueMatch(week, secondDayId, firstDayId) {
            let day1 = state[week][firstDayId];
            let day2 = state[week][secondDayId];
            if(!day1 || !day2 || (!day1.vocab && !day1.pattern) || !day2.speaking) return { percent: 0, matches: [] };

            let words = getCleanLinesArray(day1.vocab).map(l => l.split('-')[0].split(':')[0].trim().toLowerCase());
            let patterns = getCleanLinesArray(day1.pattern).map(l => l.toLowerCase());
            
            let combinedTargets = [...words, ...patterns];
            let speechText = day2.speaking.toLowerCase() + " " + (day2.academicWriting || "").toLowerCase();

            if(combinedTargets.length === 0) return { percent: 0, matches: [] };

            let matchedItems = [];
            combinedTargets.forEach(item => {
                if(item && speechText.includes(item) && !matchedItems.includes(item)) {
                    matchedItems.push(item);
                }
            });

            let percent = Math.round((matchedItems.length / combinedTargets.length) * 100);
            return { percent: percent, matches: matchedItems };
        }

        function checkDayStatus(data, week, dayId) {
            if (data.isRest) return true;
            return data.tasks.every(Boolean) && data.topicName.trim().length > 1;
        }

        function updateAbsoluteCalendarTimer() {
            let currentCalendarTime = new Date(); 
            let diffMiliseconds = TARGET_DEADLINE - currentCalendarTime;

            if (diffMiliseconds <= 0) {
                document.getElementById('dl-days').innerText = "00";
                document.getElementById('dl-hours').innerText = "00";
                document.getElementById('dl-mins').innerText = "00";
                document.getElementById('dl-secs').innerText = "00";
                document.getElementById('dl-bar').style.width = "0%";
                return;
            }

            let days = Math.floor(diffMiliseconds / (1000 * 60 * 60 * 24));
            let hours = Math.floor((diffMiliseconds % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            let minutes = Math.floor((diffMiliseconds % (1000 * 60 * 60)) / (1000 * 60));
            let seconds = Math.floor((diffMiliseconds % (1000 * 60)) / 1000);

            document.getElementById('dl-days').innerText = days.toString().padStart(2, '0');
            document.getElementById('dl-hours').innerText = hours.toString().padStart(2, '0');
            document.getElementById('dl-mins').innerText = minutes.toString().padStart(2, '0');
            document.getElementById('dl-secs').innerText = seconds.toString().padStart(2, '0');

            let maxPeriod = TARGET_DEADLINE - START_DATE;
            let currentPassed = currentCalendarTime - START_DATE;
            let barProgress = 100 - Math.max(0, Math.min(100, (currentPassed / maxPeriod) * 100));
            document.getElementById('dl-bar').style.width = barProgress + "%";
        }

        function buildGlobalStats() {
            let streak = 0;
            let totalVocab = 0;
            let totalPattern = 0;
            let totalGrammar = 0;
            let totalSpeech = 0;

            for (let w = 1; w <= TOTAL_WEEKS; w++) {
                DAYS.forEach(d => {
                    let data = state[w][d.id];
                    if(data) {
                        totalVocab += countUniqueLines(data.vocab);
                        totalPattern += countUniqueLines(data.pattern);
                        if(data.grammar && data.grammar.trim().length > 0) totalGrammar++;
                        if(data.speaking && data.speaking.trim().length > 0) totalSpeech++;
                        if(data.completed && !data.isRest) streak++;
                    }
                });
            }

            if(document.getElementById('st-streak')) document.getElementById('st-streak').innerText = streak + " kun";
            if(document.getElementById('st-vocab')) document.getElementById('st-vocab').innerText = totalVocab;
            if(document.getElementById('st-pattern')) document.getElementById('st-pattern').innerText = totalPattern;
            if(document.getElementById('st-grammar')) document.getElementById('st-grammar').innerText = totalGrammar;
            if(document.getElementById('st-speech')) document.getElementById('st-speech').innerText = totalSpeech;
        }

        function init() {
            renderTabs(); 
            renderDays(); 
            buildGlobalStats();
            renderReports();
            
            updateAbsoluteCalendarTimer();
            setInterval(updateAbsoluteCalendarTimer, 1000); 
            
            setInterval(() => {
                let now = new Date();
                document.getElementById('live-clock').innerText = now.toLocaleDateString('uz-UZ', { weekday: 'short', month: 'short', day: 'numeric' }) + " | " + now.toLocaleTimeString('uz-UZ');
            }, 1000);
        }

        function renderTabs() {
            const box = document.getElementById('tab-box'); box.innerHTML = '';
            for(let w=1; w<=TOTAL_WEEKS; w++) {
                let b = document.createElement('button');
                b.className = `tab ${w===activeWeek?'active':''}`; b.innerText = `${w}-W`;
                b.onclick = (e) => { 
                    activeWeek = w; 
                    document.getElementById('lbl-wk').innerText = `${w}-Hafta`; 
                    renderTabs(); 
                    renderDays(); 
                    renderReports(); 
                };
                box.appendChild(b);
            }
        }

        function renderDays() {
            const box = document.getElementById('day-box'); box.innerHTML = '';
            DAYS.forEach((d) => {
                let data = state[activeWeek][d.id];
                let dId = `${activeWeek}-${d.id}`;
                let dateStr = getDayDateString(activeWeek, d.id);
                let currentDayCheck = isToday(activeWeek, d.id);
                
                let checklistHTML = '';
                if(!data.isRest) {
                    let tasksList = d.type === 'input' ? [
                        "📘 1. Murphy Grammar: Yangi qoidani o'rganish va matn bazasida hayotiy gap tuzish",
                        "⚡ 2. DEEP READING (20 daqiqa): Transkript 1-yarmini o'qish, struktura tahlili",
                        "🔍 3. Pattern Isolation: Matndan yoqqan nutqiy tayyor qoliplarni ajratib olish",
                        "🎧 4. Dictation: Matnning 1-yarmini audiodan eshitib yozish",
                        "🗣️ 5. Shadowing: Spiker ketidan intonatsiyani baqirib qaytarish",
                        "🎤 6. Pyramid Speaking Attack: Savollar asosida nutqni kengaytirish"
                    ] : [
                        "🔄 1. Murphy Review: O'rganilgan yangi elementlarni ko'zdan kechirish",
                        "💥 2. READING COMPLETION: Qolgan 2-yarmini o'qish va yangi patternlarni yig'ish (Collect)",
                        "🎧 3. Dictation (2-yarmi): Qolgan qismni eshitib yozishni yakunlash",
                        "🚀 4. Full Shadowing: Butun matnni audio bilan to'xtamay qaytarish",
                        "🔥 5. SPONTAN SPEAKING ATTACK: Olingan barcha qiyin iboralarni nutqqa majburlab tiqish",
                        "✍️ 6. Academic Writing: Mavzu yuzasidan 1 ta mukammal akademik abzas yozish"
                    ];
                    
                    if(!data.tasks || data.tasks.length !== tasksList.length) {
                        data.tasks = new Array(tasksList.length).fill(false);
                    }

                    tasksList.forEach((t, tIdx) => {
                        checklistHTML += `<div class="task-line">
                            <input type="checkbox" ${data.tasks[tIdx]?'checked':''} onchange="chk('${d.id}',${tIdx},this.checked)">
                            <span>${t}</span>
                        </div>`;
                    });
                }

                let row = document.createElement('div'); 
                row.className = `day-row ${currentDayCheck ? 'is-today' : ''}`;
                row.innerHTML = `
                    <div class="day-header" onclick="currentSelectedDay='${d.id}'; if(currentReportTab==='day') renderReports(); toggleExpand('c-${dId}')">
                        <span style="font-weight:bold; display: flex; align-items: center;">
                            [${dateStr}] ${d.id}
                            <span class="badge-type ${d.type === 'input' ? 'in':'out'}">${d.type.toUpperCase()}</span>
                            ${currentDayCheck ? '<span class="today-tag">BUGUN</span>' : ''}
                        </span>
                        <span id="ico-${dId}">${checkDayStatus(data, activeWeek, d.id)?'✅':'⏳'}</span>
                    </div>
                    <div class="day-content" id="c-${dId}">
                        ${data.isRest ? '<p style="color:var(--danger); font-size:11px; text-align:center; font-weight: bold;">Miyani tiklash kuni. Dam oling!</p>' : `
                            <div class="inputs-row">
                                <div class="topic-input-wrapper">
                                    <label>🎬 Elllo Audio / Kunlik Mavzu:</label>
                                    <input type="text" value="${data.topicName || ''}" placeholder="Mavzu nomi" oninput="txtDirect('${d.id}','topicName',this.value)">
                                </div>
                                <div class="topic-input-wrapper">
                                    <label>📘 Murphy Grammar Unit:</label>
                                    <input type="text" value="${data.murphyUnit || ''}" placeholder="Masalan: Unit 32" oninput="txtDirect('${d.id}','murphyUnit',this.value)">
                                </div>
                            </div>

                            <div>${checklistHTML}</div>

                            <div class="nested-grid">
                                ${d.type === 'input' ? `
                                    <div class="fld">
                                        <label>📚 1-KUN LUG'ATI (Har qatorda bittadan):</label>
                                        <textarea placeholder="so'z - tarjimasi" oninput="txtLive('${d.id}','vocab',this.value)">${data.vocab || ''}</textarea>
                                        <span class="counter" id="vc-${dId}">0 ta so'z</span>
                                        <div class="live-bar"><div class="live-bar-fill" id="vb-${dId}"></div></div>
                                    </div>
                                    <div class="fld">
                                        <label>🔄 AJRATILGAN PATTERNLAR:</label>
                                        <textarea placeholder="In terms of..." oninput="txtLive('${d.id}','pattern',this.value)">${data.pattern || ''}</textarea>
                                        <span class="counter" id="pc-${dId}">0 ta pattern</span>
                                    </div>
                                    <div class="fld">
                                        <label>✍️ Murphy Ovozli Gaplari:</label>
                                        <textarea placeholder="Tuzilgan gaplar..." oninput="txtLive('${d.id}','grammar',this.value)">${data.grammar || ''}</textarea>
                                    </div>
                                ` : `
                                    <div class="fld">
                                        <label>🗣️ Spontan Speaking Attack Transkripti:</label>
                                        <textarea placeholder="Gapirgan nutqingiz matni..." oninput="txtLive('${d.id}','speaking',this.value)">${data.speaking || ''}</textarea>
                                    </div>
                                    <div class="fld">
                                        <label>✍️ Academic Writing (1 abzas xulosa):</label>
                                        <textarea placeholder="Akademik xulosa..." oninput="txtLive('${d.id}','academicWriting',this.value)">${data.academicWriting || ''}</textarea>
                                    </div>
                                `}
                            </div>
                        `}
                    </div>
                `;
                box.appendChild(row);
                if(!data.isRest && d.type==='input') { updateBars(d.id); }
            });
        }

        function toggleExpand(id) {
            let el = document.getElementById(id);
            if(el) el.classList.toggle('open');
        }

        function switchReportTab(tabType) {
            currentReportTab = tabType;
            document.querySelectorAll('.an-tab').forEach(btn => btn.classList.remove('active'));
            if(event) event.target.classList.add('active');
            renderReports();
        }

        window.chk = function(dId, idx, val) { state[activeWeek][dId].tasks[idx] = val; sync(dId); }
        window.txtDirect = function(dId, field, val) { state[activeWeek][dId][field] = val; sync(dId); }
        
        window.txtLive = function(dId, field, val) {
            state[activeWeek][dId][field] = val;
            if(state[activeWeek][dId].type === 'input') updateBars(dId);
            sync(dId);
        }

        function updateBars(dId) {
            let data = state[activeWeek][dId];
            let lines = countUniqueLines(data.vocab);
            let pLines = countUniqueLines(data.pattern);
            
            let lbl = document.getElementById(`vc-${activeWeek}-${dId}`);
            let bar = document.getElementById(`vb-${activeWeek}-${dId}`);
            let pLbl = document.getElementById(`pc-${activeWeek}-${dId}`);
            
            if(lbl) lbl.innerText = `${lines} ta so'z`;
            if(bar) bar.style.width = `${Math.min(100, (lines/15)*100)}%`;
            if(pLbl) pLbl.innerText = `${pLines} ta pattern`;
        }

        function sync(dId) {
            state[activeWeek][dId].completed = checkDayStatus(state[activeWeek][dId], activeWeek, dId);
            save();
            buildGlobalStats();
            renderReports();
            let ico = document.getElementById(`ico-${activeWeek}-${dId}`);
            if(ico) ico.innerText = state[activeWeek][dId].completed ? '✅' : '⏳';
        }

        function renderReports() {
            const panel = document.getElementById('report-content-panel');
            if(!panel) return;
            panel.innerHTML = '';

            if (currentReportTab === 'day') {
                let data = state[activeWeek][currentSelectedDay];
                let section = document.createElement('div');
                section.className = 'report-section';
                
                let html = `<h4>KUNLIK TAHLIL: ${currentSelectedDay.toUpperCase()}</h4>`;
                if(data.isRest) {
                    html += `<p class="empty-state">Bugun dam olish kuni. Neyronlar yangi ma'lumotlarni tartibga solmoqda.</p>`;
                } else {
                    let vCount = countUniqueLines(data.vocab);
                    let pCount = countUniqueLines(data.pattern);
                    html += `<p style="font-size:12px; margin-bottom:8px;">🎯 <b>Mavzu:</b> ${data.topicName || 'Kiritilmagan'}</p>`;
                    html += `<p style="font-size:12px; margin-bottom:8px;">📘 <b>Grammatika:</b> ${data.murphyUnit || 'Kiritilmagan'}</p>`;
                    
                    if(data.type === 'input') {
                        html += `<ul class="analysis-list">
                            <li>Kiritilgan so'zlar: <b>${vCount} ta</b> (Tavsiya: min 15 ta)</li>
                            <li>Kiritilgan qoliplar (Patterns): <b>${pCount} ta</b></li>
                            <li>Grammatika amaliyoti: <b>${data.grammar.trim() ? 'Bajarildi ✅' : 'Bajarilmadi ❌'}</b></li>
                        </ul>`;
                    } else if(data.type === 'output') {
                        let pairDayId = data.pair;
                        let matchInfo = calculateTrueMatch(activeWeek, currentSelectedDay, pairDayId);
                        let badgeClass = matchInfo.percent >= 50 ? 'match-high' : 'match-low';
                        
                        html += `<div style="margin: 10px 0;">
                            <span class="match-badge ${badgeClass}">True Match: ${matchInfo.percent}%</span>
                        </div>`;
                        html += `<p style="font-size:11px; color:#94a3b8; margin-bottom:6px;">Spontan nutqda ishlatilgan maqsadli elementlar:</p>`;
                        if(matchInfo.matches.length > 0) {
                            html += `<ul class="analysis-list">`;
                            matchInfo.matches.forEach(m => { html += `<li>🔥 ${m}</li>`; });
                            html += `</ul>`;
                        } else {
                            html += `<p class="empty-state">Input kunidagi birorta ham yangi so'z yoki pattern transkript ichida aniqlanmadi.</p>`;
                        }
                    }
                }
                section.innerHTML = html;
                panel.appendChild(section);

            } else if (currentReportTab === 'week') {
                let section = document.createElement('div');
                section.className = 'report-section';
                let html = `<h4>${activeWeek}-HAFTALIK MATRIX TAHLILI</h4>`;
                
                let doneDays = 0;
                let wVocab = 0;
                let wPattern = 0;
                
                DAYS.forEach(d => {
                    let data = state[activeWeek][d.id];
                    if(data.completed) doneDays++;
                    wVocab += countUniqueLines(data.vocab);
                    wPattern += countUniqueLines(data.pattern);
                });
                
                let weekProgress = Math.round((doneDays / DAYS.length) * 100);
                
                html += `
                    <div class="progress-container">
                        <div class="progress-fill" style="width: ${weekProgress}%"></div>
                        <div class="progress-text">Haftalik umumiy progress: ${weekProgress}%</div>
                    </div>
                    <ul class="analysis-list" style="margin-top:10px;">
                        <li>Yakunlangan kunlar: <b>${doneDays} / 7</b></li>
                        <li>Haftalik yangi lug'at: <b>${wVocab} ta so'z</b></li>
                        <li>Haftalik olingan qoliplar: <b>${wPattern} ta pattern</b></li>
                    </ul>
                `;
                section.innerHTML = html;
                panel.appendChild(section);

            } else if (currentReportTab === 'month') {
                let section = document.createElement('div');
                section.className = 'report-section';
                let html = `<h4>12 HAFTALIK GLOBAL STRATEGIYA XARITASI</h4>`;
                
                for(let w=1; w<=TOTAL_WEEKS; w++) {
                    let dCount = 0;
                    DAYS.forEach(d => { if(state[w] && state[w][d.id] && state[w][d.id].completed) dCount++; });
                    let p = Math.round((dCount / DAYS.length) * 100);
                    
                    html += `
                        <div style="margin-bottom:10px;">
                            <div style="display:flex; justify-content:space-between; font-size:11px; margin-bottom:2px;">
                                <span style="${w===activeWeek?'color:var(--accent);font-weight:bold;':''}">${w}-Hafta konveyeri</span>
                                <span>${p}%</span>
                            </div>
                            <div class="progress-container" style="height:8px; margin:0;">
                                <div class="progress-fill" style="width: ${p}%; background: ${p === 100 ? 'var(--success)' : 'var(--primary)'}"></div>
                            </div>
                        </div>
                    `;
                }
                section.innerHTML = html;
                panel.appendChild(section);
            }
        }

        function exportBackup() {
            let dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(state));
            let downloadAnchor = document.createElement('a');
            downloadAnchor.setAttribute("href", dataStr);
            downloadAnchor.setAttribute("download", `B2_Matrix_Hardcore_Backup_${new Date().toISOString().split('T')[0]}.json`);
            document.body.appendChild(downloadAnchor);
            downloadAnchor.click();
            downloadAnchor.remove();
        }

        function importBackup(input) {
            let file = input.files[0];
            if (!file) return;
            let reader = new FileReader();
            reader.onload = function(e) {
                try {
                    let importedState = JSON.parse(e.target.result);
                    if (importedState && typeof importedState === 'object') {
                        state = importedState;
                        save();
                        init();
                        alert("Barcha ma'lumotlar real vaqt rejimida muvaffaqiyatli tiklandi! 🔥");
                    } else {
                        alert("Fayl formati noto'g'ri.");
                    }
                } catch (err) {
                    alert("Zaxira faylini o'qishda xatolik yuz berdi.");
                }
            };
            reader.readAsText(file);
        }

        // Dasturni dastlabki ishga tushirish
        init();
    </script>
</body>
</html>
